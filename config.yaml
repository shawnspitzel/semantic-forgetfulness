# Base LLM
model_name: meta-llama/Llama-3.2-3B-Instruct #"Qwen/Qwen2.5-3B-Instruct"
embed_dim: 2048  # Qwen2.5-3B hidden_size; tests override to 768 (gpt2)

# Segmentation
segment_target: 20
segment_hard_cap: 25

# CE layout — must satisfy C_L2 > C_L3 > E + B
C_L2: 8
C_L3: 5
E: 2
B: 2

# Cache sizes
l2_capacity: 200
l3_capacity: 1000

# Tier activation (total tokens in session)
l2_activation_threshold: 800
l3_activation_threshold: 3200

# Eviction scoring
alpha: 0.6
lam: 0.1

# Miss detection
miss_detection_theta: 0.7
leniency: 2

# Reconstructor
reconstruction_theta: 0.75
tau: 0.7
reconstruction_retry_budget: 3

# Importance scoring
tsp_layer_index: -1  # -1 = floor(num_layers/2) at runtime

# Memory layer
memory_enabled: true

# Training
lora_rank: 16
min_session_length: 20
fine_tuning_steps: 1
context_window_W: 100
pretrain_learning_rate: 0.0002
finetune_learning_rate: 0.00005
